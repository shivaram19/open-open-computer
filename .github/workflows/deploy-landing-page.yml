# .github/workflows/deploy-landing-page.yml
# Deploy the Sukha landing page to GitHub Pages.
#
# Trigger: push to main that touches landing-page/** or this workflow.
# Output : https://shivaram19.github.io/open-open-computer/

name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing-page/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload landing page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
