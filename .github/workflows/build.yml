name: Build and Attest

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Build artifact
        run: |
          cd acn
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist/

      - name: Generate SBOM
        run: |
          cd acn
          pip install cyclonedx-bom
          cyclonedx-py environment --outfile sbom.json || true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244169eb09fcbf4dfbf1e977c7d5d6fbf8b291 # v2.2.0
        with:
          subject-path: |
            acn/dist/*.tar.gz
            acn/dist/*.whl

      - name: Attest SBOM
        uses: actions/attest-sbom@1155a4dab5d3aaab07b34165c3c52e525d0f38e1 # v2.2.0
        with:
          subject-path: |
            acn/dist/*.tar.gz
            acn/dist/*.whl
          sbom-path: acn/sbom.json
          push-to-registry: false

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-artifacts
          path: |
            acn/dist/
            acn/sbom.json
          retention-days: 30
